name: Publish MCP

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to npm instead of only running dry-run checks"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    tags:
      - "mcp-v*"

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            mcp-server/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix mcp-server ci

      - name: Install skills-ref
        run: uv tool install --from git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref skills-ref

      - name: Validate repo
        run: npm run check

      - name: Build MCP package
        run: npm --prefix mcp-server run build:bundle

      - name: Smoke test MCP package
        run: npm --prefix mcp-server run smoke

      - name: Pack dry run
        run: npm --prefix mcp-server run pack:dry-run

      - name: Publish to npm
        if: github.ref_type == 'tag' || github.event.inputs.publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm --prefix mcp-server publish --provenance --access public
