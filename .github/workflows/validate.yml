name: Validate Plugin

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate docs
        run: python3 scripts/generate_docs.py

      - name: Validate manifests and skill links
        run: python3 scripts/validate_plugin.py
